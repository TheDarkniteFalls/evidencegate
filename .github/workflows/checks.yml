name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install ".[test]"
      - run: evidencegate --self-test
      - run: python -B evidencegate.py --self-test
      - run: python -B -m unittest discover -s tests -v
      - run: python -B tools/check_conformance.py
      - run: python -B examples/run-v1-reference.py
      - run: python -B examples/check_failure_semantics.py
      - run: python -B -m json.tool schemas/agent-run-receipt-v1.schema.json
      - run: python -B evidencegate.py validate examples/v1-review-ready.json
      - run: python -B evidencegate.py render examples/v1-review-ready.json
      - run: python -B evidencegate.py examples/good-run.json
      - run: python -B evidencegate.py examples/agent-run-receipt.json
      - run: python -B evidencegate.py examples/python-cli-bugfix.json
      - run: python -B evidencegate.py examples/browser-qa-regression.json
      - run: python -B evidencegate.py examples/public-safety-publication.json
      - run: >-
          python -B -m py_compile
          evidencegate.py
          examples/run-v1-reference.py
          examples/check_failure_semantics.py
          tools/check_conformance.py
          tests/test_evidencegate.py
          tests/test_conformance.py
          tests/test_reference_run.py
          tests/test_failure_semantics.py
